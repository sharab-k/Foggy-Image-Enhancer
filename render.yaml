services:
  - type: web
    name: foggy-image-enhancer-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0 # Render supports various versions
      - key: PORT
        value: 10000
